<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Скачать видео по ссылке онлайн бесплатно — Быстро и легко</title>
    <meta name="description" content="Удобный сервис позволяет быстро скачать видео по ссылке онлайн. Установить видео из TikTok без водяных знаков, YouTube и VK в высоком качестве MP4 бесплатно.">
    <meta name="keywords" content="Скачать видео по ссылке, Скачать видио по ссылке, скачать видео по ссылке, скачать видио по ссылке, Установить видео по ссылке, Установить видио по ссылке, установить видео по ссылке, установить видио по ссылке, Видео по ссылке, Видио по ссылке, видео по ссылке, видио по ссылке, скачать видео онлайн, скачать видео с ютуба, скачать видео из тик ток без водяного знака, видео загрузчик, mp4 downloader, скачать видео из вк">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #222222;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        h1 { color: #4CAF50; margin-bottom: 5px; }
        p.subtitle { color: #aaaaaa; margin-top: 0; margin-bottom: 25px; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
        }
        select, button {
            padding: 12px;
            border-radius: 5px;
            border: none;
            background-color: #444;
            color: #fff;
            cursor: pointer;
        }
        button.btn-download {
            background-color: #4CAF50;
            font-weight: bold;
        }
        button.btn-download:hover { background-color: #45a049; }
        .error-msg { color: #ff4444; margin-top: 15px; display: none; }
        .success-msg { color: #4CAF50; margin-top: 15px; display: none; }

        /* Стили для всплывающего окна (Модалки) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            max-width: 550px;
            width: 90%;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .modal-content h2 {
            color: #4CAF50;
            margin-top: 0;
            font-size: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .agreement-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 20px 0;
            text-align: left;
            line-height: 1.4;
            color: #dddddd;
            font-size: 14px;
        }
        .agreement-item input[type="checkbox"] {
            margin-top: 3px;
            transform: scale(1.2);
            cursor: pointer;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            background-color: #333333;
            color: #777777;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }
        .btn-submit.active {
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="agreementModal">
        <div class="modal-content">
            <h2>Пользовательское соглашение и правовые нормы</h2>
            
            <div class="agreement-item">
                <input type="checkbox" id="check1" class="terms-check">
                <label for="check1">Я безоговорочно подтверждаю, что загружаемый медиаконтент является моей интеллектуальной собственностью, защищенной авторским правом, либо публикуется мной на правах законного правообладателя (первоисточника).</label>
            </div>

            <div class="agreement-item">
                <input type="checkbox" id="check2" class="terms-check">
                <label for="check2">Я в полной мере ознакомлен с действующим законодательством в сфере защиты авторских и смежных прав, а также с внутренними регламентами и политиками конфиденциальности задействованных медиаплатформ.</label>
            </div>

            <div class="agreement-item">
                <input type="checkbox" id="check3" class="terms-check">
                <label for="check3">Я подтверждаю, что депигментированный или оригинальный исходный файл извлекается исключительно в целях персонального использования без умысла последующего нарушения исключительных прав третьих лиц.</label>
            </div>

            <button id="submitAgreement" class="btn-submit" disabled>Готово</button>
        </div>
    </div>

    <div class="container">
        <h1>Укажите ссылку ниже</h1>
        <p class="subtitle">Вставьте ссылку на video (YouTube, TikTok и др.)</p>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="https://www.tiktok.com/...">
            <select id="videoFormat">
                <option value="mp4">Видео (MP4)</option>
            </select>
            <button class="btn-download" id="downloadBtn">Скачать</button>
        </div>

        <div class="error-msg" id="errorBlock"></div>
        <div class="success-msg" id="successBlock"></div>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('.terms-check');
        const submitBtn = document.getElementById('submitAgreement');
        const modal = document.getElementById('agreementModal');
        let hasAgreed = false;

        // Прямая привязка функций проверки чекбоксов (с таймаутом для мобильных)
        function checkRequirements() {
            setTimeout(() => {
                const allChecked = Array.from(checkboxes).every(c => c.checked);
                if (allChecked) {
                    submitBtn.removeAttribute('disabled');
                    submitBtn.classList.add('active');
                } else {
                    submitBtn.setAttribute('disabled', 'true');
                    submitBtn.classList.remove('active');
                }
            }, 50);
        }

        checkboxes.forEach(chk => {
            chk.addEventListener('change', checkRequirements);
            chk.addEventListener('click', checkRequirements);
            chk.addEventListener('input', checkRequirements);
        });

        window.addEventListener('DOMContentLoaded', () => {
            modal.style.display = 'flex';
            checkRequirements();
        });

        submitBtn.addEventListener('click', () => {
            if (!submitBtn.hasAttribute('disabled')) {
                modal.style.display = 'none';
                hasAgreed = true;
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const urlInput = document.getElementById('videoUrl').value;
            const errorBlock = document.getElementById('errorBlock');
            const successBlock = document.getElementById('successBlock');

            errorBlock.style.display = 'none';
            successBlock.style.display = 'none';

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: urlInput,
                        agreed: hasAgreed
                    })
                });

                const result = await response.json();

                if (!result.success) {
                    errorBlock.innerText = 'Ошибка: ' + result.error;
                    errorBlock.style.display = 'block';
                } else {
                    successBlock.innerText = `Успешно скачано: "${result.title}". Начинается загрузка...`;
                    successBlock.style.display = 'block';
                    
                    const fileUrl = `/get-file/${result.file_id}`;
                    const a = document.createElement('a');
                    a.href = fileUrl;
                    a.download = result.file_id; 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            } catch (err) {
                errorBlock.innerText = 'Ошибка соединения с сервером.';
                errorBlock.style.display = 'block';
            }
        });
    </script>
</body>
</html>
